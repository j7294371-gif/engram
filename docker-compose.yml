version: "3.9"

services:
  # Engram memory service (standalone API server - coming in Phase 6)
  engram:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - engram_data:/app/data
    environment:
      - ENGRAM_BACKEND=sqlite
      - ENGRAM_DB_PATH=/app/data/engram.db
      - ENGRAM_LOG_LEVEL=INFO
    restart: unless-stopped

  # Optional: Qdrant vector database backend
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # Optional: PostgreSQL with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: engram
      POSTGRES_PASSWORD: engram
      POSTGRES_DB: engram
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  engram_data:
  qdrant_data:
  pgvector_data:
